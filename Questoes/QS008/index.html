<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. PAsse o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso</p>
    <ul>
        <li><abbr title="Use a tap &lt;p&gt;">Parágrafos</abbr></li>
        <li><abbr title="Utiliza de &lt;h1&gt; ate &lt;h6&gt;">Titulos</abbr></li>
        <li><abbr title="Utiliza a tag &lt;img&gt;">Imagens</abbr></li>
        <li><abbr title="Utiliza-se a tag &lt;abbr&gt;">Abreviações</abbr></li>
        <li><abbr title="Usa as tags &lt;ol&gt; e dentro delas coloca-se &lt;li&gt;">Listas numeradas</abbr></li> 
        <li><abbr title="usa tags &lt;ul&gt; e dentro delas coloca-se &lt;li&gt;">listas com demarcadores</abbr></li>
        <li><abbr title="Utiliza a tag &lt;code&gt; se você quiser ela espaçada coloca antes a tag &lt;pre&gt;">Código-fonte</abbr></li>
    </ul>
</body>
</html>
